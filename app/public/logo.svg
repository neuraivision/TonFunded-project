<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4DB8FF"/>
      <stop offset="100%" stop-color="#1a9de8"/>
    </linearGradient>
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d0eeff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a9de8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner glow ring -->
  <rect x="6" y="6" width="188" height="188" rx="40" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Gem / diamond shape -->
  <g transform="translate(100, 96)">
    <!-- Top crown facets -->
    <polygon points="0,-52  -34,-18  0,-28  34,-18" fill="url(#gemGrad)" opacity="0.95"/>
    <!-- Left crown facet -->
    <polygon points="-52,-6  -34,-18  0,-28" fill="white" opacity="0.6"/>
    <!-- Right crown facet -->
    <polygon points="52,-6  34,-18  0,-28" fill="white" opacity="0.4"/>
    <!-- Left side facet -->
    <polygon points="-52,-6  -34,-18  -16,38" fill="url(#gemGrad)" opacity="0.85"/>
    <!-- Right side facet -->
    <polygon points="52,-6  34,-18  16,38" fill="url(#gemGrad)" opacity="0.75"/>
    <!-- Center main facet -->
    <polygon points="-34,-18  34,-18  16,38  -16,38" fill="white" opacity="0.55"/>
    <!-- Bottom point -->
    <polygon points="-16,38  16,38  0,60" fill="url(#gemGrad)" opacity="0.9"/>
    <!-- Bottom left -->
    <polygon points="-52,-6  -16,38  0,60" fill="url(#gemGrad)" opacity="0.7"/>
    <!-- Bottom right -->
    <polygon points="52,-6  16,38  0,60" fill="url(#shimmer)" opacity="0.8"/>

    <!-- Inner sparkle highlight -->
    <polygon points="0,-28  -16,38  16,38" fill="white" opacity="0.12"/>

    <!-- Gem outline -->
    <polygon points="0,-52  34,-18  52,-6  16,38  0,60  -16,38  -52,-6  -34,-18"
      fill="none" stroke="white" stroke-width="1" stroke-opacity="0.5"/>
  </g>
</svg>
